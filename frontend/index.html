<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullcart - Amazon Clone</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f3f3f3; }
        header { background-color: #232f3e; color: white; padding: 15px 20px; display: flex; flex-direction: column; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-bottom { display: flex; align-items: center; background-color: #37475a; padding: 5px 20px; color: white; font-size: 14px; margin: 0 -20px -15px -20px; }
        .header-bottom span { margin-right: 20px; cursor: pointer; }
        header h1 { margin: 0; font-size: 24px; color: #f0a500; }
        .search-bar { flex-grow: 1; margin: 0 20px; display: flex; }
        .search-bar select { padding: 10px; background: #eee; border: none; border-radius: 4px 0 0 4px; }
        .search-bar input { width: 100%; padding: 10px; border: none; }
        .search-bar button { padding: 10px 15px; background-color: #febd69; border: none; border-radius: 0 4px 4px 0; cursor: pointer; }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        main { padding: 20px; max-width: 1200px; margin: 10px auto; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 20px; border-radius: 4px; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .product-card img { max-width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; align-self: center; }
        .product-card h3 { font-size: 16px; margin: 10px 0; color: #007185; cursor: pointer; height: 40px; overflow: hidden; }
        .product-card .price { font-size: 20px; color: #0f1111; font-weight: bold; margin: 5px 0; }
        .add-to-cart { background-color: #ffd814; border: 1px solid #fcd200; border-radius: 20px; padding: 8px 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: auto; }
        .add-to-cart:hover { background-color: #f7ca00; }
        footer { background-color: #232f3e; color: white; text-align: center; padding: 20px; margin-top: 40px; }
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 2px; padding: 16px; position: fixed; z-index: 1000; bottom: 30px; left: 50%; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="header-top">
            <a href="index.html" style="text-decoration: none;"><h1>Fullcart</h1></a>
            <div class="search-bar">
                <select id="category-filter"><option value="">All</option></select>
                <input type="text" id="search-input" placeholder="Search Fullcart">
                <button id="search-button">Search</button>
            </div>
            <div class="nav-links" id="nav-links">
                <a href="login.html" id="user-display">Hello, Sign in</a>
                <a href="#">Returns & Orders</a>
                <a href="cart.html" id="cart-count">Cart (0)</a>
            </div>
        </div>
        <div class="header-bottom" id="category-nav">
            <span onclick="loadProducts()">All</span>
        </div>
    </header>

    <main>
        <h2 id="welcome-message">Featured Products</h2>
        <div class="products-grid" id="products"></div>
    </main>
    <div id="toast">Product added to cart!</div>
    <footer><p>&copy; 2026 Fullcart System. All rights reserved.</p></footer>

    <script>
        const API_BASE = CONFIG.API_BASE;
        const user = JSON.parse(localStorage.getItem('user'));
        
        function updateCartCount() {
            if(!user) return;
            fetch(`${CONFIG.API_BASE}/cart/index.php?user_id=${user.id}`).then(res => res.json()).then(data => {
                const count = data.records ? data.records.reduce((acc, item) => acc + parseInt(item.quantity), 0) : 0;
                document.getElementById('cart-count').textContent = `Cart (${count})`;
            });
        }

        function addToCart(productId) {
            if(!user) { window.location.href = 'login.html'; return; }
            fetch(`${CONFIG.API_BASE}/cart/index.php`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: user.id, product_id: productId, quantity: 1 })
            }).then(res => res.json()).then(data => {
                const t = document.getElementById("toast"); t.textContent = data.message; t.className = "show";
                setTimeout(() => { t.className = ""; }, 3000);
                updateCartCount();
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const userDisplay = document.getElementById('user-display');
            const navLinks = document.getElementById('nav-links');

            if (user) {
                userDisplay.textContent = `Hello, ${user.name.split(' ')[0]}`;
                userDisplay.href = "#";
                updateCartCount();
                
                if(user.role === 'seller' || user.role === 'admin') {
                    const sellerLink = document.createElement('a');
                    sellerLink.href = "seller_dashboard.html";
                    sellerLink.textContent = "Seller Dashboard";
                    sellerLink.style.color = "#f0a500";
                    navLinks.insertBefore(sellerLink, document.getElementById('cart-count'));
                }

                const logoutLink = document.createElement('a');
                logoutLink.href = "#"; logoutLink.textContent = "Logout";
                logoutLink.onclick = (e) => { e.preventDefault(); localStorage.clear(); window.location.reload(); };
                navLinks.appendChild(logoutLink);
            }

            fetch(`${CONFIG.API_BASE}/categories/list.php`).then(res => res.json()).then(data => {
                data.records.forEach(cat => {
                    const opt = document.createElement('option'); opt.value = cat.id; opt.textContent = cat.name;
                    document.getElementById('category-filter').appendChild(opt);
                    const span = document.createElement('span'); span.textContent = cat.name;
                    span.onclick = () => loadProducts('', cat.id);
                    document.getElementById('category-nav').appendChild(span);
                });
            });

            window.loadProducts = function(search = '', categoryId = '') {
                let url = `${CONFIG.API_BASE}/products/list.php?`;
                if(search) url += `search=${encodeURIComponent(search)}&`;
                if(categoryId) url += `category_id=${categoryId}`;
                fetch(url).then(res => res.json()).then(data => {
                    let html = '';
                    if(data.records) data.records.forEach(product => {
                        html += `
                            <div class="product-card">
                                <img src="${product.image_url}" alt="${product.title}">
                                <h3>${product.title}</h3>
                                <p class="price">$${parseFloat(product.price).toFixed(2)}</p>
                                <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                            </div>`;
                    });
                    document.getElementById('products').innerHTML = html || '<p>No products found.</p>';
                });
            }
            loadProducts();
            document.getElementById('search-button').onclick = () => loadProducts(document.getElementById('search-input').value, document.getElementById('category-filter').value);
        });
    </script>
</body>
</html>
