<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Fullcart</title>
    <style>
        body { font-family: "Amazon Ember", Arial, sans-serif; background-color: #fff; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .logo { color: #000; font-size: 32px; font-weight: bold; text-decoration: none; margin-bottom: 20px; }
        .auth-container { width: 350px; border: 1px solid #ddd; border-radius: 8px; padding: 20px 26px; box-shadow: 0 1px 0 rgba(255,255,255,.5) inset; }
        h1 { font-size: 28px; font-weight: 400; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; padding-left: 2px; padding-bottom: 2px; }
        input { width: 100%; padding: 7px 10px; border: 1px solid #a6a6a6; border-radius: 3px; box-sizing: border-box; }
        input:focus { border-color: #e77600; box-shadow: 0 0 3px 2px rgba(228,121,17,.5); outline: 0; }
        .btn-submit { background: linear-gradient(to bottom,#f7dfa5,#f0c14b); border: 1px solid; border-color: #a88734 #9c7e31 #846a29; border-radius: 3px; color: #111; cursor: pointer; display: inline-block; padding: 0; text-align: center; text-decoration: none; vertical-align: middle; width: 100%; height: 31px; font-size: 13px; margin-top: 20px; }
        .btn-submit:hover { background: linear-gradient(to bottom,#f5d78e,#eeb933); }
        .legal { font-size: 12px; margin-top: 20px; line-height: 1.5; color: #555; }
        #message { margin-top: 15px; font-size: 13px; text-align: center; padding: 10px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
    <script src="js/config.js"></script>
</head>
<body>
    <a href="index.html" class="logo">Fullcart</a>
    <div class="auth-container">
        <h1>Create account</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Your name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <div class="form-group" style="display: flex; align-items: center;">
                <input type="checkbox" id="is_seller" style="width: auto; margin-right: 10px;">
                <label for="is_seller" style="font-weight: normal; padding: 0;">I want to sell on Fullcart</label>
            </div>
            <button type="submit" class="btn-submit">Create your Fullcart account</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const role = document.getElementById('is_seller').checked ? 'seller' : 'customer';
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: role
            };

            const response = await fetch(CONFIG.API_BASE + '/auth/register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = result.message;
            msgDiv.style.display = 'block';
            msgDiv.className = result.status === 'success' ? 'success' : 'error';
            if(result.status === 'success') setTimeout(() => window.location.href = 'login.html', 2000);
        });
    </script>
</body>
</html>
