<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Fullcart</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f3f3f3; margin: 0; }
        header { background-color: #232f3e; color: white; padding: 15px 20px; text-align: center; }
        header a { color: #f0a500; text-decoration: none; font-size: 24px; font-weight: bold; }
        main { max-width: 1000px; margin: 20px auto; display: flex; gap: 20px; padding: 0 20px; }
        .cart-items { flex-grow: 1; background: white; padding: 20px; border-radius: 4px; }
        .checkout-box { width: 300px; background: white; padding: 20px; border-radius: 4px; height: fit-content; }
        .item-card { display: flex; border-bottom: 1px solid #ddd; padding: 15px 0; }
        .item-card img { width: 150px; height: 150px; object-fit: contain; }
        .item-info { flex-grow: 1; padding-left: 20px; }
        .item-info h3 { margin: 0 0 10px 0; color: #007185; }
        .item-info .price { color: #B12704; font-weight: bold; font-size: 18px; }
        .btn-delete { color: #007185; cursor: pointer; background: none; border: none; font-size: 12px; padding: 0; }
        .btn-delete:hover { text-decoration: underline; color: #c45500; }
        .btn-checkout { background-color: #ffd814; border: 1px solid #fcd200; border-radius: 8px; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .empty-cart { text-align: center; padding: 50px; }
    </style>
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <a href="index.html">Fullcart</a>
    </header>

    <main id="cart-content">
        <div class="cart-items" id="items-list">
            <h2>Shopping Cart</h2>
            <div id="items-container">Loading...</div>
        </div>
        <div class="checkout-box" id="checkout-sidebar">
            <h3>Subtotal (<span id="total-items">0</span> items): <span id="total-price">$0.00</span></h3>
            <button class="btn-checkout" onclick="window.location.href='checkout.html'">Proceed to checkout</button>
        </div>
    </main>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user) window.location.href = 'login.html';

        function loadCart() {
            fetch(`${CONFIG.API_BASE}/cart/index.php?user_id=${user.id}`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('items-container');
                    const totalItems = document.getElementById('total-items');
                    const totalPrice = document.getElementById('total-price');
                    
                    if(data.records && data.records.length > 0) {
                        let html = '';
                        let priceSum = 0;
                        let qtySum = 0;
                        data.records.forEach(item => {
                            priceSum += item.price * item.quantity;
                            qtySum += parseInt(item.quantity);
                            html += `
                                <div class="item-card">
                                    <img src="${item.image_url}" alt="${item.title}">
                                    <div class="item-info">
                                        <h3>${item.title}</h3>
                                        <p class="price">$${parseFloat(item.price).toFixed(2)}</p>
                                        <p>Qty: ${item.quantity}</p>
                                        <button class="btn-delete" onclick="removeItem(${item.id})">Delete</button>
                                    </div>
                                </div>
                            `;
                        });
                        container.innerHTML = html;
                        totalItems.textContent = qtySum;
                        totalPrice.textContent = `$${priceSum.toFixed(2)}`;
                    } else {
                        document.getElementById('cart-content').innerHTML = `
                            <div class="empty-cart">
                                <h2>Your Fullcart Cart is empty.</h2>
                                <p>Check your <a href="index.html">Featured Products</a> and start shopping!</p>
                            </div>
                        `;
                    }
                });
        }

        function removeItem(id) {
            fetch(`${CONFIG.API_BASE}/cart/index.php?user_id=${user.id}&id=${id}`, { method: 'DELETE' })
                .then(() => loadCart());
        }

        loadCart();
    </script>
</body>
</html>
